###############################################################################
# 智能排班表生成器 - Docker Compose 部署配置
# 项目地址: https://github.com/1263478456/schedule-generator
# Docker Hub: https://hub.docker.com/r/1263478456/schedule-generator
###############################################################################

services:
  schedule-generator:
    # 镜像来源（从 Docker Hub 拉取）
    image: 1263478456/schedule-generator:latest
    
    # 容器名称
    container_name: schedule-generator
    
    # 重启策略
    restart: unless-stopped
    
    # 端口映射 - 格式: 宿主机端口:容器端口
    ports:
      - "3080:3000"    # 注意：后端端口是 3000
    
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/schedule.db
    
    # 数据卷挂载（SQLite 数据库持久化）
    volumes:
      - schedule-data:/data
    
    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络配置
    networks:
      - web

# 数据卷（持久化 SQLite 数据库）
volumes:
  schedule-data:
    driver: local

# 网络配置
networks:
  web:
    name: web
    driver: bridge
